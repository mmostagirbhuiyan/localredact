<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 900" font-family="'Inter', 'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C5CFC"/>
      <stop offset="100%" stop-color="#5B3FD4"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#27ae60"/>
      <stop offset="100%" stop-color="#1e8449"/>
    </linearGradient>
    <linearGradient id="red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e74c3c"/>
      <stop offset="100%" stop-color="#c0392b"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9B7FFF"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff6b6b"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6dffb0"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="900" fill="#0d1117" rx="12"/>

  <!-- Section Labels -->
  <text x="80" y="48" fill="#555" font-size="11" font-weight="700" letter-spacing="2">DOCUMENT INPUT</text>
  <text x="80" y="148" fill="#555" font-size="11" font-weight="700" letter-spacing="2">TWO-PHASE DETECTION</text>
  <text x="80" y="578" fill="#555" font-size="11" font-weight="700" letter-spacing="2">REVIEW</text>
  <text x="80" y="688" fill="#555" font-size="11" font-weight="700" letter-spacing="2">REDACTION PIPELINE</text>

  <!-- Input: PDF Upload -->
  <rect x="200" y="60" width="180" height="44" rx="10" fill="#1a1a2e" stroke="#7C5CFC" stroke-width="2"/>
  <text x="290" y="87" fill="#e0e0e0" font-size="13" font-weight="700" text-anchor="middle">PDF Upload</text>

  <!-- Input: Text Paste -->
  <rect x="720" y="60" width="180" height="44" rx="10" fill="#1a1a2e" stroke="#7C5CFC" stroke-width="2"/>
  <text x="810" y="87" fill="#e0e0e0" font-size="13" font-weight="700" text-anchor="middle">Text Paste</text>

  <!-- Regex Engine -->
  <rect x="660" y="170" width="260" height="54" rx="10" fill="url(#purple)" stroke="#9B7FFF" stroke-width="2"/>
  <text x="790" y="192" fill="#fff" font-size="12" font-weight="700" text-anchor="middle">Regex Engine (instant)</text>
  <text x="790" y="210" fill="rgba(255,255,255,0.8)" font-size="10" text-anchor="middle">SSN, CC, email, phone, dates</text>

  <!-- pdfjs-dist -->
  <rect x="120" y="170" width="180" height="50" rx="10" fill="#1a1a2e" stroke="#555" stroke-width="2"/>
  <text x="210" y="192" fill="#e0e0e0" font-size="11" text-anchor="middle">pdfjs-dist</text>
  <text x="210" y="208" fill="#999" font-size="10" text-anchor="middle">Text Extraction</text>

  <!-- Text Quality Check (diamond) -->
  <polygon points="205,290 270,335 205,380 140,335" fill="#1a1a2e" stroke="#7C5CFC" stroke-width="2"/>
  <text x="205" y="332" fill="#e0e0e0" font-size="10" text-anchor="middle">Text Quality</text>
  <text x="205" y="346" fill="#e0e0e0" font-size="10" text-anchor="middle">Check</text>

  <!-- Tesseract.js OCR -->
  <rect x="380" y="300" width="210" height="64" rx="10" fill="#5B3FD4" stroke="#9B7FFF" stroke-width="2"/>
  <text x="485" y="324" fill="#fff" font-size="12" font-weight="700" text-anchor="middle">Tesseract.js OCR</text>
  <text x="485" y="340" fill="rgba(255,255,255,0.8)" font-size="10" text-anchor="middle">4x scale, gamma contrast,</text>
  <text x="485" y="354" fill="rgba(255,255,255,0.8)" font-size="10" text-anchor="middle">auto-rotation</text>

  <!-- Qwen3-4B LLM -->
  <rect x="340" y="450" width="250" height="64" rx="10" fill="url(#purple)" stroke="#9B7FFF" stroke-width="2"/>
  <text x="465" y="474" fill="#fff" font-size="12" font-weight="700" text-anchor="middle">Qwen3-4B LLM (WebGPU)</text>
  <text x="465" y="490" fill="rgba(255,255,255,0.8)" font-size="10" text-anchor="middle">Names, orgs, locations,</text>
  <text x="465" y="504" fill="rgba(255,255,255,0.8)" font-size="10" text-anchor="middle">addresses, account numbers</text>

  <!-- Entity Review -->
  <rect x="280" y="590" width="340" height="50" rx="10" fill="#1a1a2e" stroke="#7C5CFC" stroke-width="2"/>
  <text x="450" y="612" fill="#e0e0e0" font-size="12" font-weight="700" text-anchor="middle">Entity Review</text>
  <text x="450" y="628" fill="#999" font-size="10" text-anchor="middle">Colored overlays on PDF, accept/reject per entity</text>

  <!-- Redaction Pipeline -->
  <rect x="80" y="710" width="130" height="44" rx="10" fill="#1a1a2e" stroke="#555" stroke-width="2"/>
  <text x="145" y="730" fill="#e0e0e0" font-size="10" text-anchor="middle">Render to</text>
  <text x="145" y="744" fill="#e0e0e0" font-size="10" text-anchor="middle">Canvas (3x)</text>

  <rect x="280" y="710" width="130" height="44" rx="10" fill="#1a1a2e" stroke="#555" stroke-width="2"/>
  <text x="345" y="730" fill="#e0e0e0" font-size="10" text-anchor="middle">Black Boxes</text>
  <text x="345" y="744" fill="#e0e0e0" font-size="10" text-anchor="middle">over PII</text>

  <rect x="480" y="710" width="140" height="44" rx="10" fill="#1a1a2e" stroke="#555" stroke-width="2"/>
  <text x="550" y="730" fill="#e0e0e0" font-size="10" text-anchor="middle">Image-Only PDF</text>
  <text x="550" y="744" fill="#e0e0e0" font-size="10" text-anchor="middle">(pdf-lib)</text>

  <rect x="690" y="710" width="150" height="44" rx="10" fill="url(#red)" stroke="#ff6b6b" stroke-width="2"/>
  <text x="765" y="730" fill="#fff" font-size="10" font-weight="700" text-anchor="middle">Hex Verify</text>
  <text x="765" y="744" fill="rgba(255,255,255,0.8)" font-size="10" text-anchor="middle">(no PII in bytes)</text>

  <!-- Download -->
  <rect x="380" y="830" width="240" height="48" rx="10" fill="url(#green)" stroke="#6dffb0" stroke-width="2"/>
  <text x="500" y="860" fill="#fff" font-size="13" font-weight="700" text-anchor="middle">Download Redacted PDF</text>

  <!-- ARROWS -->
  <!-- PDF → pdfjs -->
  <path d="M 290 104 L 290 130 L 210 130 L 210 170" fill="none" stroke="#9B7FFF" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- PDF → Regex -->
  <path d="M 290 104 L 290 130 L 790 130 L 790 170" fill="none" stroke="#9B7FFF" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Text → Regex -->
  <path d="M 810 104 L 810 130 L 790 130 L 790 170" fill="none" stroke="#9B7FFF" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- pdfjs → Quality Check -->
  <path d="M 210 220 L 210 290" fill="none" stroke="#9B7FFF" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Quality Check → OCR (poor) -->
  <path d="M 270 335 L 380 335" fill="none" stroke="#ff6b6b" stroke-width="2" marker-end="url(#arrow-red)"/>
  <rect x="295" y="318" width="80" height="18" rx="4" fill="#1a1a2e"/>
  <text x="335" y="331" fill="#ff6b6b" font-size="10" font-weight="700" text-anchor="middle">Poor quality</text>
  <!-- Quality Check → LLM (good) -->
  <path d="M 205 380 L 205 482 L 340 482" fill="none" stroke="#6dffb0" stroke-width="2" marker-end="url(#arrow-green)"/>
  <rect x="100" y="420" width="86" height="18" rx="4" fill="#1a1a2e"/>
  <text x="143" y="433" fill="#6dffb0" font-size="10" font-weight="700" text-anchor="middle">Good quality</text>
  <!-- OCR → LLM -->
  <path d="M 485 364 L 485 400 L 465 400 L 465 450" fill="none" stroke="#9B7FFF" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Regex → Review -->
  <path d="M 790 224 L 790 560 L 500 560 L 500 590" fill="none" stroke="#9B7FFF" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- LLM → Review -->
  <path d="M 465 514 L 465 560 L 420 560 L 420 590" fill="none" stroke="#9B7FFF" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Review → Render -->
  <path d="M 450 640 L 450 670 L 145 670 L 145 710" fill="none" stroke="#9B7FFF" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Render → Black -->
  <path d="M 210 732 L 280 732" fill="none" stroke="#9B7FFF" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Black → Image -->
  <path d="M 410 732 L 480 732" fill="none" stroke="#9B7FFF" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Image → Hex -->
  <path d="M 620 732 L 690 732" fill="none" stroke="#9B7FFF" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Hex → Download -->
  <path d="M 765 754 L 765 790 L 500 790 L 500 830" fill="none" stroke="#6dffb0" stroke-width="2" marker-end="url(#arrow-green)"/>
</svg>
